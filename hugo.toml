baseURL = "https://alanwu3115.github.io/"
languageCode = "en-us"
title = "AlanWu's Site"
theme = "docsy"
disableGitInfo = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.73.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false

[params]
  [params.ui]
    showLightDarkModeMenu = true
  version_menu = "版本"
  [[params.versions]]
    version = "latest"
    url = "https://alanwu3115.github.io"
  [[params.versions]]
    version = "v1.0"
    url = "https://v1.example.org"

[markup]
  [markup.highlight]
    style = "tango"
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params.custom]
  coverImageFull = "https://api.fungit.org/covers.php"
  coverImageSmall = "https://api.fungit.org/covers.php?type=small"

