# .github/workflows/hugo.yaml
name: 发布Hugo网站到Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.149.0
    steps:
      - name: 安装Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: 安装Dart Sass
        run: sudo snap install dart-sass

      - name: 检出
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 设置Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 安装 Node 依赖 / 确保 PostCSS 可用
        run: |
          # 如果仓库声明了依赖（更可靠），优先使用 npm ci
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            echo "Found lockfile -> npm ci"
            npm ci
          elif [[ -f package.json ]]; then
            echo "Found package.json but no lockfile -> npm install"
            npm install
          else
            echo "No package.json -> install postcss-cli globally so Hugo can call postcss"
            npm install -g postcss-cli postcss autoprefixer
          fi

          # 验证 postcss 命令是否存在（出错会使 step 失败）
          if command -v postcss >/dev/null 2>&1; then
            echo "postcss is available: $(postcss --version || echo 'version unknown')"
          else
            echo "postcss not found via PATH. Attempting to use npx to check..."
            npx postcss --version
          fi

      - name: 使用Hugo构建
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物（Pages artifact）
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

